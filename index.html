<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Properly Hydrated</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { min-height: 100%; }

    body {
      background: #f5f2ed;
      font-family: 'Inter', system-ui, sans-serif;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 3.5rem 1.5rem 5rem;
      position: relative;
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      inset: -10%;
      width: 120%;
      height: 120%;
      background-image: url('image.png');
      background-size: cover;
      background-position: center;
      opacity: 0.13;
      animation: kenburns 22s ease-in-out infinite alternate;
      z-index: 0;
      will-change: transform;
    }

    @keyframes kenburns {
      0%   { transform: scale(1)    translateX(0%)    translateY(0%); }
      33%  { transform: scale(1.06) translateX(-1.5%) translateY(1%); }
      66%  { transform: scale(1.04) translateX(1%)    translateY(-1.5%); }
      100% { transform: scale(1.08) translateX(-1%)   translateY(0.5%); }
    }

    .container {
      width: 100%;
      max-width: 480px;
      position: relative;
      z-index: 1;
    }

    header { margin-bottom: 2.5rem; }

    h1 {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #1a1a1a;
      margin-bottom: 5px;
    }

    .subtitle {
      font-size: 13px;
      color: #999;
      font-weight: 300;
      letter-spacing: 0.02em;
    }

    .divider {
      width: 28px;
      height: 1px;
      background: #c8c3bb;
      margin: 1.75rem 0 2.25rem;
    }

    .set-list { list-style: none; }

    .set-list li:first-child a { border-top: 0.5px solid #d4cfc7; }

    .set-list a {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      padding: 15px 0;
      border-bottom: 0.5px solid #d4cfc7;
      text-decoration: none;
      color: inherit;
      transition: opacity 0.15s ease;
    }

    .set-list a:hover { opacity: 0.45; }

    .set-name {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.01em;
      color: #1a1a1a;
    }

    .set-meta {
      display: flex;
      align-items: center;
      gap: 9px;
      flex-shrink: 0;
    }

    .set-date {
      font-size: 12px;
      color: #aaa;
      font-weight: 300;
      letter-spacing: 0.03em;
    }

    .icon { width: 15px; height: 15px; opacity: 0.45; }

    footer {
      margin-top: 2.75rem;
      font-size: 11px;
      color: #bbb;
      letter-spacing: 0.05em;
      font-weight: 300;
    }
  </style>
</head>
<body>
  <div class="bg"></div>

  <div class="container">
    <header>
      <h1>Properly Hydrated</h1>
      <p class="subtitle">sets &amp; recordings</p>
    </header>

    <div class="divider"></div>

    <ul class="set-list">

      <!--
        TO ADD A NEW SET: copy one <li> block below and fill in:
          - href: the YouTube or SoundCloud URL
          - .set-name: title of the set
          - .set-date: month + year (e.g. "Mar 2026")
        Paste the new <li> at the top of the list so newest is first.
      -->

      <li>
        <a href="https://youtu.be/fX7_dKXz55c" target="_blank" rel="noopener">
          <span class="set-name">Balti b2b Roman — house set</span>
          <span class="set-meta">
            <span class="set-date">Mar 2026</span>
            <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M23.5 6.5a3.003 3.003 0 00-2.113-2.126C19.505 4 12 4 12 4s-7.505 0-9.387.374A3.003 3.003 0 00.5 6.5C.13 8.395 0 10.197 0 12s.13 3.605.5 5.5a3.003 3.003 0 002.113 2.126C4.495 20 12 20 12 20s7.505 0 9.387-.374A3.003 3.003 0 0023.5 17.5C23.87 15.605 24 13.803 24 12s-.13-3.605-.5-5.5zM9.75 15.5v-7l6.5 3.5-6.5 3.5z" fill="currentColor"/>
            </svg>
          </span>
        </a>
      </li>

      <li>
        <a href="https://youtu.be/uIEn9UNWSLI" target="_blank" rel="noopener">
          <span class="set-name">Maximum Groove w/ Daimei, Balti — Hi-Note Radio</span>
          <span class="set-meta">
            <span class="set-date">Mar 2026</span>
            <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M23.5 6.5a3.003 3.003 0 00-2.113-2.126C19.505 4 12 4 12 4s-7.505 0-9.387.374A3.003 3.003 0 00.5 6.5C.13 8.395 0 10.197 0 12s.13 3.605.5 5.5a3.003 3.003 0 002.113 2.126C4.495 20 12 20 12 20s7.505 0 9.387-.374A3.003 3.003 0 0023.5 17.5C23.87 15.605 24 13.803 24 12s-.13-3.605-.5-5.5zM9.75 15.5v-7l6.5 3.5-6.5 3.5z" fill="currentColor"/>
            </svg>
          </span>
        </a>
      </li>

    </ul>

    <footer>properly hydrated &nbsp;&middot;&nbsp; brooklyn</footer>
  </div>
</body>
</html>
